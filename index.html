<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Задачник+ — Голосовой тайм-менеджер</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b35">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1e1e1e; --surface: #2d2d2d; --surface-hover: #363636;
  --border: #404040; --text: #ffffff; --text2: #c0c0c0; --text3: #909090;
  --accent: #ff6b35; --accent-light: rgba(255,107,53,0.12); --accent-dark: #e55a25;
  --green: #10b981; --green-light: rgba(16,185,129,0.12);
  --yellow: #f59e0b; --yellow-light: rgba(245,158,11,0.12);
  --red: #ef4444; --red-light: rgba(239,68,68,0.12);
  --radius: 16px; --radius-sm: 12px; --radius-xs: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  min-height: 100dvh; padding-bottom: 80px; -webkit-font-smoothing: antialiased;
  font-size: 16px;
}

/* ===== HEADER ===== */
.header {
  padding: 16px 16px 0; position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.greeting { font-size: 13px; color: var(--text2); }
.greeting strong { color: var(--text); font-size: 20px; display: block; margin-top: 2px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.sync-status {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text3); padding: 4px 8px;
  background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); transition: background 0.3s;
}
.sync-dot.online { background: var(--green); }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
.header-btn {
  width: 44px; height: 44px; border-radius: 50%; background: var(--surface);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; transition: all 0.2s; color: var(--text);
}
.header-btn:hover { border-color: var(--accent); }
.header-btn.mic { background: var(--accent); border-color: var(--accent); font-size: 18px; }
.header-btn.mic.listening { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.4)} 50%{box-shadow:0 0 0 8px rgba(255,107,53,0)} }

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; margin: 0 0 12px;
  background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border);
}
.stats-left { display: flex; align-items: center; gap: 8px; }
.stats-count { font-size: 14px; font-weight: 700; }
.stats-count .num { color: var(--accent); }
.stats-right { flex: 1; margin: 0 12px; }
.progress-bar {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.3s ease;
}
.motivation {
  font-size: 13px; font-weight: 600; color: var(--accent);
  animation: fadeInUp 0.4s ease; display: none;
}
.motivation.show { display: block; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

/* ===== COLUMNS ===== */
.board {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  padding: 0 16px; min-height: 60vh;
}
.column {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 300px; flex: 1;
}
.column.drag-over { border-color: var(--accent); background: var(--accent-light); }
.column-header {
  padding: 14px 14px 10px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.column-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.column-count {
  font-size: 11px; font-weight: 700; color: var(--accent); background: var(--accent-light);
  padding: 2px 8px; border-radius: 10px;
}
.column-body { flex: 1; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.column-body.empty { align-items: center; justify-content: center; }
.column-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 20px 8px; }

/* ===== TASK CARD ===== */
.task-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; cursor: grab; transition: all 0.2s; position: relative;
  animation: fadeInUp 0.3s ease;
}
.task-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
.task-card.dragging { opacity: 0.5; transform: scale(0.95); }
.task-card.done { opacity: 0.4; }
.task-card.done .task-title { text-decoration: line-through; }
.task-top { display: flex; align-items: flex-start; gap: 8px; }
.task-check {
  width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0; margin-top: 1px; font-size: 11px; color: transparent;
}
.task-check:hover { border-color: var(--accent); }
.task-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
.task-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.task-tag { font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 600; }
.tag-high { background: var(--red-light); color: var(--red); }
.tag-medium { background: var(--yellow-light); color: var(--yellow); }
.tag-low { background: var(--green-light); color: var(--green); }
.tag-cat { background: rgba(255,255,255,0.06); color: var(--text2); }
.task-date { font-size: 10px; color: var(--text3); }
.task-delete {
  position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border); color: var(--text3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.2s;
}
.task-card:hover .task-delete { opacity: 1; border-color: var(--red); color: var(--red); }
.task-delete:hover { background: var(--red-light); color: var(--red); }

/* ===== SUBTASKS ===== */
.subtasks { margin-top: 8px; padding-left: 4px; }
.subtask-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); padding: 2px 0; }
.subtask-check {
  width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 8px; color: transparent; transition: all 0.15s; flex-shrink: 0;
}
.subtask-check.checked { background: var(--green); border-color: var(--green); color: #fff; }
.subtask-row.done span { text-decoration: line-through; color: var(--text3); }

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 76px; right: 16px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--accent); color: #fff; border: none;
  font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(255,107,53,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s; z-index: 50;
}
/* ===== HISTORY ===== */
.history-section {
  border-top: 1px solid var(--border);
}
.history-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  font-size: 13px; color: var(--text3); border-bottom: 1px solid var(--border);
}
.history-item:last-child { border-bottom: none; }
.history-item .done-check { color: var(--green); }
.history-item .done-title { text-decoration: line-through; flex: 1; }
.history-item .done-date { font-size: 11px; }
.fab:hover { transform: scale(1.1); }
.fab:active { transform: scale(0.95); }

/* ===== VOICE BAR ===== */
.voice-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px; z-index: 100;
}
.voice-bar.listening {
  border-top-color: var(--accent);
  box-shadow: 0 -2px 12px rgba(255,107,53,0.3);
}
/* ===== VOICE SUBTITLE ===== */
.voice-subtitle {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px;
  border-radius: 12px; font-size: 13px; max-width: 80%; text-align: center;
  z-index: 101; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.voice-subtitle.show { opacity: 1; }
/* ===== VOICE WAVES ===== */
@keyframes voiceWave {
  0%,100% { height: 4px; }
  50% { height: 20px; }
}
.voice-waves {
  display: flex; gap: 3px; align-items: center; height: 24px;
}
.voice-wave-bar {
  width: 3px; background: var(--accent); border-radius: 2px;
  animation: voiceWave 0.6s ease-in-out infinite;
}
.voice-wave-bar:nth-child(2) { animation-delay: 0.1s; }
.voice-wave-bar:nth-child(3) { animation-delay: 0.2s; }
.voice-wave-bar:nth-child(4) { animation-delay: 0.3s; }
.voice-wave-bar:nth-child(5) { animation-delay: 0.4s; }
.voice-input {
  flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 24px; font-size: 14px; font-family: var(--font); color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.voice-input:focus { border-color: var(--accent); }
.voice-input::placeholder { color: var(--text3); }
.voice-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff;
  border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: all 0.2s;
}
.voice-btn:hover { background: var(--accent-dark); }
.voice-btn.listening { animation: pulse 1s infinite; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
  padding: 20px 16px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-xs); color: var(--text); font-size: 14px; font-family: var(--font);
  outline: none; transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { min-height: 70px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn {
  flex: 1; padding: 12px; border-radius: var(--radius-xs); border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

/* ===== TOAST ===== */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: var(--surface); color: var(--text); padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 600; z-index: 300; transition: transform 0.3s;
  border: 1px solid var(--border); box-shadow: var(--shadow);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== SETTINGS MODAL ===== */
.settings-overlay { z-index: 250; }

/* ===== AI PANEL ===== */
.ai-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; gap: 8px; padding: 12px 16px;
  background: var(--bg); border-top: 1px solid var(--border);
  z-index: 50; justify-content: center;
}
.ai-btn {
  padding: 10px 16px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: var(--font);
}
.ai-btn:hover { border-color: var(--accent); background: var(--accent-light); }

/* ===== CONFETTI ===== */
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .board { grid-template-columns: 1fr; gap: 16px; }
  .column { min-height: 150px; }
  .header-btn { width: 40px; height: 40px; font-size: 16px; }
  .greeting strong { font-size: 18px; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .board { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-top">
    <div class="greeting">
      <span id="greetingText">Доброе утро</span>
      <strong>Задачник+</strong>
    </div>
    <div class="header-actions">
      <div class="sync-status" id="syncStatus">
        <span class="sync-dot" id="syncDot"></span>
        <span class="sync-text" id="syncText"> offline</span>
      </div>
      <div class="header-btn" id="micBtn" onclick="toggleVoice()" title="Голосовой ввод" style="display:none">🎤</div>
      <div class="header-btn" onclick="syncToGitHub()" title="Синхронизировать с VK">🔄</div>
      <div class="header-btn" onclick="openSettings()" title="Настройки">⚙️</div>
    </div>
  </div>
</div>

<!-- ===== STATS BAR ===== -->
<div style="padding: 12px 16px 0">
  <div class="stats-bar">
    <div class="stats-left">
      <div class="stats-count">✅ <span class="num" id="statDone">0</span> из <span class="num" id="statTotal">0</span></div>
    </div>
    <div class="stats-right">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
    <div class="motivation" id="motivation"></div>
  </div>
</div>

<!-- ===== KANBAN BOARD ===== -->
<div class="board" id="board">
  <!-- Сегодня -->
  <div class="column" data-col="today" ondragover="onDragOver(event)" ondrop="onDrop(event,'today')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title">📌 Сегодня</div>
      <div class="column-count" id="countToday">0</div>
    </div>
    <div class="column-body" id="colToday"></div>
  </div>

  <!-- Неделя -->
  <div class="column" data-col="week" ondragover="onDragOver(event)" ondrop="onDrop(event,'week')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title">📅 Неделя</div>
      <div class="column-count" id="countWeek">0</div>
    </div>
    <div class="column-body" id="colWeek"></div>
  </div>

  <!-- Бэклог -->
  <div class="column" data-col="backlog" ondragover="onDragOver(event)" ondrop="onDrop(event,'backlog')" ondragleave="onDragLeave(event)">
    <div class="column-header">
      <div class="column-title">📋 Бэклог</div>
      <div class="column-count" id="countBacklog">0</div>
    </div>
    <div class="column-body" id="colBacklog"></div>
  </div>
</div>

<!-- ===== FAB ===== -->
<button class="fab" onclick="openModal()">+</button>

<!-- ===== HISTORY ===== -->
<div class="history-section" id="historySection" style="display:none;padding:16px">
  <h3 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2)">📋 Выполненные задачи</h3>
  <div id="historyList"></div>
</div>

<!-- ===== VOICE BAR ===== -->
<div class="voice-bar">
  <input class="voice-input" id="voiceInput" placeholder="Нажми 🎤 или напиши..." onkeydown="if(event.key==='Enter')sendText()">
  <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
</div>

<!-- ===== VOICE SUBTITLE ===== -->
<div class="voice-subtitle" id="voiceSubtitle"></div>

<!-- ===== AI PANEL (скрыта, вызывается через настройки) ===== -->
<div class="ai-panel" id="aiPanel" style="display:none">
  <button class="ai-btn" onclick="analyzeDay()">📊 Анализ дня</button>
  <button class="ai-btn" onclick="planDay()">🤖 План на день</button>
  <button class="ai-btn" onclick="syncToGitHub()">🔄 Синхронизация</button>
</div>

<!-- ===== AI BUTTON (в хедере) ===== -->
<div class="header-btn" onclick="toggleAIPanel()" title="AI-функции" style="margin-left:8px;background:var(--accent);border-color:var(--accent)">🤖</div>

<!-- ===== MODAL: TASK ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Новая задача</h3>
    <div class="form-group">
      <label class="form-label">Что нужно сделать?</label>
      <input class="form-input" id="fTitle" placeholder="Например: Отчёт по рекламе">
    </div>
    <div class="form-group">
      <label class="form-label">Заметка</label>
      <textarea class="form-textarea" id="fNote" placeholder="Детали..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Дата</label>
        <input class="form-input" type="date" id="fDate">
      </div>
      <div class="form-group">
        <label class="form-label">Время</label>
        <input class="form-input" type="time" id="fTime">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Приоритет</label>
        <select class="form-select" id="fPriority">
          <option value="high">🔴 Срочно</option>
          <option value="medium" selected>🟡 Важно</option>
          <option value="low">🟢 Потом</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Категория</label>
      <select class="form-select" id="fCategory">
        <option value="">Без категории</option>
        <option value="work">💼 Работа</option>
        <option value="home">🏠 Личное</option>
        <option value="study">📚 Учёба</option>
        <option value="health">💪 Здоровье</option>
        <option value="project">🎯 Проект</option>
        <option value="shop">🛒 Покупки</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Повторять</label>
      <select class="form-select" id="fRepeat">
        <option value="">Никогда</option>
        <option value="daily">Ежедневно</option>
        <option value="weekly">Еженедельно</option>
        <option value="monthly">Ежемесячно</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Подзадачи (по одной на строку)</label>
      <textarea class="form-textarea" id="fSubtasks" placeholder="Подзадача 1&#10;Подзадача 2" style="min-height:50px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveTask()">Добавить</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: SETTINGS ===== -->
<div class="modal-overlay settings-overlay" id="settingsOverlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>⚙️ Настройки</h3>
    <div class="form-group">
      <label class="form-label">GitHub Token (для AI)</label>
      <input class="form-input" id="settingsToken" type="password" placeholder="ghp_...">
      <div style="font-size:10px;color:var(--text3);margin-top:3px">Токен для AI-чата. Хранится только в браузере.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Голосовой вывод</label>
      <select class="form-select" id="settingsVoice">
        <option value="on">Включён</option>
        <option value="off">Выключен</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Голос</label>
      <select class="form-select" id="settingsGender">
        <option value="female">Женский</option>
        <option value="male">Мужской</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Скорость речи</label>
      <select class="form-select" id="settingsSpeed">
        <option value="slow">Медленно</option>
        <option value="normal">Нормально</option>
        <option value="fast">Быстро</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeSettings()">Отмена</button>
      <button class="btn btn-primary" onclick="saveSettings()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
let tasks = JSON.parse(localStorage.getItem('zadachnik_tasks') || '[]');
let settings = JSON.parse(localStorage.getItem('zadachnik_settings') || '{"ai_key":"","voice":"on","voiceGender":"female","voiceSpeed":"normal"}');
let editingId = null;
let dragId = null;
let recognition = null;
let synth = window.speechSynthesis;
let syncTimer = null;

const CAT_LABELS = { work:'💼 Работа', home:'🏠 Личное', study:'📚 Учёба', health:'💪 Здоровье', project:'🎯 Проект', shop:'🛒 Покупки' };
const PRI_LABELS = { high:'🔴 Срочно', medium:'🟡 Важно', low:'🟢 Потом' };
const MOTIVATION = ['🔥 Ты огонь!','🚀 Маркетинговый титан!','💪 Так держать!','🏆 Ты лучший!','⭐ Звезда дня!'];

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(d) { return d.toISOString().slice(0,10); }
function today() { return fmtDate(new Date()); }

function daysDiff(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(today() + 'T00:00:00');
  return Math.round((d - t) / 86400000);
}

function getColumn(t) {
  if (t.done) return 'today';
  if (!t.date) return 'backlog';
  const diff = daysDiff(t.date);
  if (diff <= 0) return 'today';
  if (diff <= 7) return 'week';
  return 'backlog';
}

// ==================== GITHUB SYNC ====================
async function loadFromGitHub() {
  const token = settings.ai_key;
  if (!token) {
    updateSyncStatus('error', ' нет токена');
    return;
  }

  updateSyncStatus('syncing', ' загрузка...');

  try {
    const resp = await fetch('https://api.github.com/repos/unicompact-stack/bossyoki/contents/tasks.json', {
      headers: { 'Authorization': 'token ' + token }
    });

    if (resp.ok) {
      const file = await resp.json();
      const content = decodeURIComponent(escape(atob(file.content)));
      const githubData = JSON.parse(content);

      // Поддержка нового формата (с version) и старого (массив)
      const githubTasks = Array.isArray(githubData) ? githubData : (githubData.tasks || []);

      // Объединяем: GitHub задачи + локальные (локальные приоритетнее)
      const localIds = new Set(tasks.map(t => t.id));
      const newTasks = githubTasks.filter(t => !localIds.has(t.id));

      if (newTasks.length) {
        tasks = [...tasks, ...newTasks];
        localStorage.setItem('zadachnik_tasks', JSON.stringify(tasks));
        renderAll();
        toast(`📥 Загружено ${newTasks.length} задач с GitHub`);
      }

      updateSyncStatus('online', ' синхронизировано');
    } else if (resp.status === 404) {
      // Файла нет — создаём
      updateSyncStatus('online', ' файл не найден');
    }
  } catch(e) {
    console.log('GitHub load error:', e);
    updateSyncStatus('error', ' ошибка загрузки');
  }
}

// ==================== GREETING ====================
function updateGreeting() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes().toString().padStart(2, '0');
  let g = 'Доброе утро';
  if (h >= 12 && h < 17) g = 'Добрый день';
  else if (h >= 17 && h < 22) g = 'Добрый вечер';
  else if (h >= 22 || h < 5) g = 'Доброй ночи';
  document.getElementById('greetingText').textContent = `${g} • ${h}:${m}`;
}

// Обновляем время каждую минуту
setInterval(updateGreeting, 60000);

// ==================== RENDER ====================
function renderAll() {
  const cols = { today: [], week: [], backlog: [] };
  tasks.forEach(t => { cols[getColumn(t)].push(t); });

  Object.keys(cols).forEach(k => {
    cols[k].sort((a,b) => {
      const p = {high:0,medium:1,low:2};
      return (p[a.priority]||1) - (p[b.priority]||1);
    });
  });

  ['today','week','backlog'].forEach(k => {
    const el = document.getElementById('col' + k.charAt(0).toUpperCase() + k.slice(1));
    const count = document.getElementById('count' + k.charAt(0).toUpperCase() + k.slice(1));
    count.textContent = cols[k].length;
    if (cols[k].length) {
      el.innerHTML = cols[k].map(t => taskCard(t)).join('');
      el.classList.remove('empty');
    } else {
      el.innerHTML = '<div class="column-empty">Нет задач</div>';
      el.classList.add('empty');
    }
  });

  updateStats();
  updateHistory();
  save();
}

function updateHistory() {
  const doneTasks = tasks.filter(t => t.done).sort((a,b) => {
    if (!a.created || !b.created) return 0;
    return new Date(b.created) - new Date(a.created);
  }).slice(0, 10); // Последние 10

  const historySection = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');

  if (doneTasks.length) {
    historySection.style.display = 'block';
    historyList.innerHTML = doneTasks.map(t => {
      const dateStr = t.created ? new Date(t.created).toLocaleDateString('ru-RU', {day:'numeric',month:'short'}) : '';
      return `<div class="history-item">
        <span class="done-check">✓</span>
        <span class="done-title">${esc(t.title)}</span>
        <span class="done-date">${dateStr}</span>
      </div>`;
    }).join('');
  } else {
    historySection.style.display = 'none';
  }
}

function taskCard(t) {
  const priLabel = PRI_LABELS[t.priority] || '';
  const catLabel = CAT_LABELS[t.category] || '';
  const dateStr = t.date ? new Date(t.date+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'}) : '';
  const timeStr = t.time ? `⏰ ${t.time}` : '';
  const repeatStr = t.repeat ? '🔄' : '';
  const repeatLabel = t.repeat === 'daily' ? 'Ежедневно' : t.repeat === 'weekly' ? 'Еженедельно' : t.repeat === 'monthly' ? 'Ежемесячно' : '';

  let subtasksHtml = '';
  if (t.subtasks && t.subtasks.length) {
    subtasksHtml = `<div class="subtasks">${t.subtasks.map((st,i) => {
      const checked = t.subtaskDone && t.subtaskDone[i];
      return `<div class="subtask-row${checked?' done':''}">
        <div class="subtask-check${checked?' checked':''}" onclick="event.stopPropagation();toggleSub('${t.id}',${i})">✓</div>
        <span>${esc(st)}</span>
      </div>`;
    }).join('')}</div>`;
  }

  return `<div class="task-card${t.done?' done':''}" draggable="true" ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event)" data-id="${t.id}">
    <button class="task-delete" onclick="event.stopPropagation();deleteTask('${t.id}')" title="Удалить">🗑️</button>
    <div class="task-top">
      <div class="task-check${t.done?' checked':''}" onclick="event.stopPropagation();toggleTask('${t.id}')">✓</div>
      <div class="task-body" onclick="editTask('${t.id}')">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          ${priLabel ? `<span class="task-tag tag-${t.priority}">${priLabel}</span>` : ''}
          ${catLabel ? `<span class="task-tag tag-cat">${catLabel}</span>` : ''}
          ${dateStr ? `<span class="task-date">${dateStr}</span>` : ''}
          ${timeStr ? `<span class="task-date">${timeStr}</span>` : ''}
          ${repeatStr ? `<span class="task-date" title="${repeatLabel}">${repeatStr}</span>` : ''}
        </div>
        ${subtasksHtml}
      </div>
    </div>
  </div>`;
}

// ==================== DRAG & DROP ====================
function onDragStart(e, id) {
  dragId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  dragId = null;
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, col) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain') || dragId;
  if (!id) return;
  const t = tasks.find(x => x.id === id);
  if (!t) return;

  const todayDate = today();
  if (col === 'today') {
    t.date = todayDate;
  } else if (col === 'week') {
    const d = new Date(todayDate + 'T00:00:00');
    d.setDate(d.getDate() + 3);
    t.date = fmtDate(d);
  } else {
    t.date = '';
  }
  dragId = null;
  renderAll();
}

// ==================== TASK ACTIONS ====================
function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) {
    t.done = !t.done;
    renderAll();
    if (t.done) {
      playSound('done');
      toast('✅ Молодец!');
      speak('Отлично! Задача выполнена');
      showNotification('BossYoki', `Задача "${t.title}" выполнена!`);
      
      // Повторяющаяся задача
      if (t.repeat) {
        const newDate = new Date(t.date + 'T00:00:00');
        if (t.repeat === 'daily') newDate.setDate(newDate.getDate() + 1);
        else if (t.repeat === 'weekly') newDate.setDate(newDate.getDate() + 7);
        else if (t.repeat === 'monthly') newDate.setMonth(newDate.getMonth() + 1);
        
        const newTask = {
          ...t,
          id: genId(),
          date: fmtDate(newDate),
          done: false,
          subtaskDone: [],
          created: new Date().toISOString()
        };
        tasks.push(newTask);
        renderAll();
        toast(`🔄 Задача повторяется: ${fmtDate(newDate)}`);
      }
    }
  }
}
function toggleSub(taskId, idx) {
  const t = tasks.find(x => x.id === taskId);
  if (t) {
    if (!t.subtaskDone) t.subtaskDone = [];
    t.subtaskDone[idx] = !t.subtaskDone[idx];
    renderAll();
  }
}
function deleteTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t && confirm(`Удалить "${t.title}"?`)) {
    tasks = tasks.filter(x => x.id !== id);
    renderAll();
    toast('🗑 Удалено');
  }
}

// ==================== MODAL ====================
function openModal(id) {
  editingId = id || null;
  const t = id ? tasks.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = t ? 'Редактировать' : 'Новая задача';
  document.getElementById('modalSaveBtn').textContent = t ? 'Сохранить' : 'Добавить';
  document.getElementById('fTitle').value = t ? t.title : '';
  document.getElementById('fNote').value = t ? (t.note||'') : '';
  document.getElementById('fDate').value = t ? t.date : today();
  document.getElementById('fTime').value = t ? (t.time||'') : '';
  document.getElementById('fPriority').value = t ? t.priority : 'medium';
  document.getElementById('fCategory').value = t ? (t.category||'') : '';
  document.getElementById('fRepeat').value = t ? (t.repeat||'') : '';
  document.getElementById('fSubtasks').value = t && t.subtasks ? t.subtasks.join('\n') : '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 300);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
function editTask(id) { openModal(id); }

function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) return;
  const subtasksRaw = document.getElementById('fSubtasks').value.trim();
  const subtasks = subtasksRaw ? subtasksRaw.split('\n').filter(s=>s.trim()) : [];
  const isEditing = !!editingId;
  const data = {
    title,
    note: document.getElementById('fNote').value.trim(),
    date: document.getElementById('fDate').value,
    time: document.getElementById('fTime').value,
    priority: document.getElementById('fPriority').value,
    category: document.getElementById('fCategory').value,
    repeat: document.getElementById('fRepeat').value,
    subtasks
  };
  if (editingId) {
    const t = tasks.find(x => x.id === editingId);
    if (t) Object.assign(t, data);
  } else {
    tasks.push({ id: genId(), ...data, done: false, subtaskDone: [], created: new Date().toISOString() });
  }
  closeModal();
  renderAll();
  const timeStr = data.time ? ` в ${data.time}` : '';
  const repeatStr = data.repeat ? ' 🔄' : '';
  toast(isEditing ? 'Сохранено' : `✅ "${data.title}" → ${data.date}${timeStr}${repeatStr}`);
}

// ==================== STATS ====================
function updateStats() {
  const activeTasks = tasks.filter(t => !t.done);
  const doneTasks = tasks.filter(t => t.done).length;
  const total = activeTasks.length + doneTasks;

  document.getElementById('statDone').textContent = doneTasks;
  document.getElementById('statTotal').textContent = total;

  const progress = total > 0 ? (doneTasks / total * 100) : 0;
  document.getElementById('progressFill').style.width = progress + '%';

  const motivation = document.getElementById('motivation');
  if (doneTasks >= 5) {
    motivation.textContent = MOTIVATION[Math.floor(Math.random() * MOTIVATION.length)];
    motivation.classList.add('show');
    if (doneTasks === 5) {
      playSound('done');
      showNotification('BossYoki', 'Ты сегодня супергерой! 5 задач выполнено!');
      speak('Пять задач выполнено! Ты супергерой!');
      createConfetti();
    }
  } else {
    motivation.classList.remove('show');
  }
}

function createConfetti() {
  const colors = ['#ff6b35', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
  for (let i = 0; i < 50; i++) {
    const confetti = document.createElement('div');
    confetti.style.cssText = `
      position: fixed; top: -10px; left: ${Math.random() * 100}%;
      width: 10px; height: 10px; background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: 50%; pointer-events: none; z-index: 1000;
      animation: confettiFall ${2 + Math.random() * 2}s linear forwards;
    `;
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 4000);
  }
}

// ==================== VOICE ====================
function initSpeech() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('voiceInput').value = text;
    processVoiceCommand(text);
    stopListening();
  };
  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
}

function toggleVoice() {
  if (!recognition) { initSpeech(); }
  if (!recognition) { toast('🎤 Голосовой ввод не поддерживается'); return; }
  if (recognition.recognizing) {
    recognition.stop();
  } else {
    startListening();
  }
}

function startListening() {
  recognition.start();
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('voiceBtn').classList.add('listening');
  document.querySelector('.voice-bar').classList.add('listening');
  showVoiceSubtitle('Слушаю...');
}
function stopListening() {
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('voiceBtn').classList.remove('listening');
  document.querySelector('.voice-bar').classList.remove('listening');
  hideVoiceSubtitle();
}

function showVoiceSubtitle(text) {
  const el = document.getElementById('voiceSubtitle');
  el.textContent = text;
  el.classList.add('show');
}
function hideVoiceSubtitle() {
  document.getElementById('voiceSubtitle').classList.remove('show');
}

function processVoiceCommand(text) {
  const lower = text.toLowerCase();
  showVoiceSubtitle(text);

  // Команды для просмотра
  if (lower.includes('что у меня') || lower.includes('покажи задачи') || lower.includes('список')) {
    const todayTasks = tasks.filter(t => !t.done && getColumn(t) === 'today');
    if (todayTasks.length) {
      const list = todayTasks.map((t,i) => `${i+1}. ${t.title}`).join(', ');
      speak(`У тебя ${todayTasks.length} задач на сегодня: ${list}`);
    } else {
      speak('На сегодня задач нет. Молодец!');
    }
    return;
  }

  // Покажи срочные
  if (lower.includes('покажи срочн') || lower.includes('что горит')) {
    const urgentTasks = tasks.filter(t => !t.done && t.priority === 'high');
    if (urgentTasks.length) {
      const list = urgentTasks.map((t,i) => `${i+1}. ${t.title}`).join(', ');
      speak(`Срочных задач: ${urgentTasks.length}. ${list}`);
    } else {
      speak('Срочных задач нет. Отдыхай!');
    }
    return;
  }

  // Что завтра
  if (lower.includes('что завтра') || lower.includes('завтра что')) {
    const tomorrow = new Date(today() + 'T00:00:00');
    tomorrow.setDate(tomorrow.getDate() + 1);
    const tomorrowStr = fmtDate(tomorrow);
    const tomorrowTasks = tasks.filter(t => !t.done && t.date === tomorrowStr);
    if (tomorrowTasks.length) {
      const list = tomorrowTasks.map((t,i) => `${i+1}. ${t.title}`).join(', ');
      speak(`На завтра ${tomorrowTasks.length} задач: ${list}`);
    } else {
      speak('На завтра задач нет. Свободен!');
    }
    return;
  }

  // Мотивация
  if (lower.includes('мотивац') || lower.includes('воодушеви')) {
    speak(MOTIVATION[Math.floor(Math.random() * MOTIVATION.length)]);
    return;
  }

  // План на день
  if (lower.includes('план на день') || lower.includes('что делать')) {
    planDay();
    return;
  }

  // Удалить задачу
  if (lower.includes('удалить задачу') || lower.includes('убери задачу')) {
    const titleToDelete = text.replace(/удалить задачу|убери задачу/gi, '').trim();
    const taskToDelete = tasks.find(t => t.title.toLowerCase().includes(titleToDelete.toLowerCase()));
    if (taskToDelete) {
      tasks = tasks.filter(t => t.id !== taskToDelete.id);
      renderAll();
      speak(`Задача "${taskToDelete.title}" удалена`);
    } else {
      speak('Не нашёл такую задачу. Повтори название.');
    }
    return;
  }

  // Пытаемся распознать как команду добавления
  const hasAddKeyword = lower.includes('сделать') || lower.includes('встреч') || lower.includes('позвон')
    || lower.includes('купить') || lower.includes('написать') || lower.includes('отправ')
    || lower.includes('подготов') || lower.includes('сделай') || lower.includes('нужно')
    || lower.includes('забыл') || lower.includes('напомни') || lower.includes('срочно')
    || lower.includes('важно') || lower.includes('горит') || lower.includes('завтра')
    || lower.includes('сегодня') || lower.includes('потом') || lower.includes('через');

  if (hasAddKeyword) {
    // Определяем колонку
    let col = 'today';
    if (lower.includes('завтра')) col = 'week';
    else if (lower.includes('недел') || lower.includes('через')) col = 'week';
    else if (lower.includes('потом') || lower.includes('когда-ниб') || lower.includes('бэклог')) col = 'backlog';

    // Определяем приоритет
    let pri = 'medium';
    if (lower.includes('срочно') || lower.includes('важно') || lower.includes('горит')) pri = 'high';
    else if (lower.includes('потом') || lower.includes('не срочно')) pri = 'low';

    // Убираем ключевые слова из названия
    let title = text
      .replace(/сегодня|завтра|неделю|неделе|через \d+ дн\w*|через \d+ мин\w*|через \d+ час\w*|потом|срочно|важно|горит|не срочно/gi, '')
      .trim();
    if (!title) title = text;

    // Дата и время
    let date = today();
    let time = '';
    
    // "через 5 минут" → текущее время + 5 минут
    const minMatch = text.match(/через (\d+) мин/);
    const hourMatch = text.match(/через (\d+) час/);
    const dayMatch = text.match(/через (\d+) дн/);
    
    if (minMatch) {
      const now = new Date();
      now.setMinutes(now.getMinutes() + parseInt(minMatch[1]));
      date = fmtDate(now);
      time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      col = 'today';
    } else if (hourMatch) {
      const now = new Date();
      now.setHours(now.getHours() + parseInt(hourMatch[1]));
      date = fmtDate(now);
      time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      col = 'today';
    } else if (dayMatch) {
      const d = new Date(today() + 'T00:00:00');
      d.setDate(d.getDate() + parseInt(dayMatch[1]));
      date = fmtDate(d);
      col = 'week';
    } else if (lower.includes('завтра')) {
      const d = new Date(today() + 'T00:00:00');
      d.setDate(d.getDate() + 1);
      date = fmtDate(d);
      col = 'week';
    } else if (lower.includes('послезавтра')) {
      const d = new Date(today() + 'T00:00:00');
      d.setDate(d.getDate() + 2);
      date = fmtDate(d);
      col = 'week';
    } else if (lower.includes('через')) {
      const d = new Date(today() + 'T00:00:00');
      d.setDate(d.getDate() + 3);
      date = fmtDate(d);
      col = 'week';
    }
    if (col === 'backlog') date = '';

    // Определяем время (если ещё не задано через "через X минут")
    if (!time) {
      const timeMatch = text.match(/в (\d{1,2}[:\.]\d{2})/);
      const hourMatch = text.match(/в (\d{1,2}) (час|часа|часов)/);
      if (timeMatch) {
        time = timeMatch[1].replace('.', ':');
      } else if (hourMatch) {
        time = hourMatch[1].padStart(2, '0') + ':00';
      }
    }

    tasks.push({ id: genId(), title, note:'', date, time, priority: pri, category:'', subtasks:[], subtaskDone:[], done:false, created: new Date().toISOString() });
    renderAll();
    const colName = col === 'today' ? 'Сегодня' : col === 'week' ? 'Неделя' : 'Бэклог';
    const timeStr = time ? ` в ${time}` : '';
    toast(`✅ "${title}" → ${colName}${timeStr}`);
    speak(`Задача добавлена в "${colName}"${timeStr}`);
    return;
  }

  // Не распознано как команда → отправляем в AI
  // Если AI тоже не поможет — скажем "Повтори"
  askAI(text);
}

function sendText() {
  const input = document.getElementById('voiceInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  processVoiceCommand(text);
}

function speak(text) {
  if (settings.voice === 'off' || !synth) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU';
  
  // Скорость речи
  const speedMap = { slow: 0.7, normal: 1, fast: 1.3 };
  u.rate = speedMap[settings.voiceSpeed] || 1;
  
  // Пол голоса (выбираем подходящий голос)
  const voices = synth.getVoices();
  const ruVoices = voices.filter(v => v.lang.startsWith('ru'));
  if (ruVoices.length) {
    const genderVoice = ruVoices.find(v => 
      settings.voiceGender === 'male' ? v.name.toLowerCase().includes('male') || v.name.includes('Михаил') : 
      v.name.toLowerCase().includes('female') || v.name.includes('Анна') || v.name.includes('Milena')
    );
    if (genderVoice) u.voice = genderVoice;
  }
  
  u.pitch = 1;
  synth.speak(u);
}

// ==================== AI CHAT ====================
const AI_API_URL = 'https://models.inference.ai.azure.com/chat/completions';
const AI_MODEL = 'gpt-4o-mini';

const SYSTEM_PROMPT = `Ты — BossYoki, жёсткий и требовательный, но справедливый наставник.
Твоя задача — помогать пользователю быть продуктивным.
Хвали за успехи, особенно если выполнил срочные задачи.
Если откладывает дела, мягко, но настойчиво напоминай о важности дедлайнов.
Твой голос — уверенный и воодушевляющий.

Ты понимаешь команды и можешь:
1. Добавлять задачи ([ADD_TASK: название, дата, приоритет])
2. Отмечать выполненные ([DONE_TASK: id])
3. Удалять задачи ([DEL_TASK: id])
4. Показывать список задач
5. Отвечать на вопросы о планировании

Говори на русском, коротко и по делу.`;

function getTasksContext() {
  const active = tasks.filter(t => !t.done);
  if (!active.length) return 'Нет активных задач.';
  return active.map(t => `- [${t.id}] ${t.title} (${t.date || 'без даты'}, ${t.priority||'medium'})`).join('\n');
}

function parseAIActions(reply) {
  const addMatch = reply.match(/\[ADD_TASK:\s*(.+?)\]/);
  if (addMatch) {
    const parts = addMatch[1].split(',').map(s=>s.trim());
    const title = parts[0];
    const date = parts[1] || today();
    const pri = parts[2] || 'medium';
    tasks.push({ id:genId(), title, note:'', date, priority:pri, category:'', subtasks:[], subtaskDone:[], done:false, created:new Date().toISOString() });
    renderAll();
  }
  const doneMatch = reply.match(/\[DONE_TASK:\s*(.+?)\]/);
  if (doneMatch) {
    const t = tasks.find(x => x.id===doneMatch[1].trim());
    if (t) { t.done = true; renderAll(); }
  }
  const delMatch = reply.match(/\[DEL_TASK:\s*(.+?)\]/);
  if (delMatch) {
    const t = tasks.find(x => x.id===delMatch[1].trim());
    if (t) { tasks = tasks.filter(x => x.id !== t.id); renderAll(); }
  }
}

async function askAI(text) {
  const apiKey = settings.ai_key;
  if (!apiKey) {
    toast('⚠️ Введи GitHub Token в настройках');
    openSettings();
    return;
  }
  try {
    const systemMsg = SYSTEM_PROMPT + '\n\nТекущие задачи:\n' + getTasksContext();
    const messages = [
      { role:'system', content:systemMsg },
      { role:'user', content:text }
    ];
    const r = await fetch(AI_API_URL, {
      method:'POST',
      headers: { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: AI_MODEL, messages, max_tokens: 500, temperature: 0.7 })
    });
    const data = await r.json();
    const reply = data.choices?.[0]?.message?.content || 'Ошибка AI';
    parseAIActions(reply);
    const cleanReply = reply.replace(/\[(?:ADD_TASK|DEL_TASK|DONE_TASK):.*?\]/g, '').trim();
    if (cleanReply) {
      toast(cleanReply.slice(0, 60));
      speak(cleanReply);
    }
  } catch(e) {
    toast('⚠️ Ошибка связи с AI');
  }
}

// Синхронизация с GitHub (чтобы VK-бот знал задачи)
async function syncToGitHub() {
  const token = settings.ai_key;
  if (!token) { toast('⚠️ Введи GitHub Token в настройках'); return; }

  updateSyncStatus('syncing', ' синхронизация...');

  // Формат с version и updatedAt
  const data = JSON.stringify({
    version: '1.0',
    updatedAt: new Date().toISOString(),
    tasks: tasks
  }, null, 2);

  const repo = 'unicompact-stack/bossyoki';
  const path = 'tasks.json';

  try {
    let sha = '';
    try {
      const getResp = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        headers: { 'Authorization': 'token ' + token }
      });
      if (getResp.ok) {
        const fileInfo = await getResp.json();
        sha = fileInfo.sha;
      }
    } catch(e) {}

    const body = {
      message: 'Обновление задач из веб-приложения',
      content: btoa(unescape(encodeURIComponent(data))),
      sha: sha
    };

    const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (resp.ok) {
      const now = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
      updateSyncStatus('online', ` ${now}`);
      toast(`✅ Синхронизировано ${now}`);
    } else {
      updateSyncStatus('error', ' ошибка');
      toast('⚠️ Ошибка синхронизации');
    }
  } catch(e) {
    updateSyncStatus('error', ' offline');
    toast('⚠️ Ошибка сети');
  }
}

let audioCtx = null;

function playSound(type) {
  if (settings.voice === 'off') return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  if (type === 'done') {
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  } else if (type === 'reminder') {
    osc.frequency.setValueAtTime(500, audioCtx.currentTime);
    osc.frequency.setValueAtTime(700, audioCtx.currentTime + 0.15);
    osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  }
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function showNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '📋' });
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
